version: "3.8"

services:
  back:
    build: ./back
    container_name: course-recommend-back
    ports:
      - "8000:8000"
    environment:
      - DB_PATH=/app/data/app.db
    volumes:
      - ./back/data:/app/data
    restart: unless-stopped

  front:
    build: ./front
    container_name: course-recommend-front
    ports:
      - "8501:8501"
    environment:
      - FASTAPI_URL=http://back:8000
    depends_on:
      - back
    restart: unless-stopped
